<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <header class="app__header">
    <h1>Task Manager</h1>
  </header>

  <main class="app__main">
    <!-- Form to add a new task -->
    <section class="task-form-container">
      <h2>New Task</h2>
      <form id="taskForm" class="task-form">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" class="task-form__input" required />

        <label for="description">Description</label>
        <textarea id="description" name="description" class="task-form__textarea"></textarea>

        <button type="submit" class="task-form__submit">Add Task</button>
      </form>
    </section>

    <!-- List of tasks -->
    <section class="task-list-container">
      <h2>My Tasks</h2>
      <ul id="tasks" class="task-list"></ul>
    </section>
  </main>

  <footer class="app__footer">
    <small>Sebastian Padilla · HTML · CSS · JS</small>
  </footer>
</body>

</html>
